<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magiske Timer 2026 | Bergen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0f172a;
            --light: #f8fafc;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--dark);
            color: var(--light);
            line-height: 1.6;
        }

        /* HEADER / HERO */
        header {
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), 
                        url('https://images.unsplash.com/photo-1504194906613-324209869635?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 4px solid var(--gold);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            margin: 0;
            color: var(--gold);
        }

        .sub-text {
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        /* NEDTELLING */
        #countdown-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--gold);
            backdrop-filter: blur(10px);
            margin: 30px 0;
            max-width: 600px;
        }

        .timer {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .time-box {
            display: flex;
            flex-direction: column;
        }

        .time-box span:first-child {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 700;
            font-family: 'Playfair Display', serif;
            line-height: 1;
        }

        .time-box span:last-child {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--gold);
            margin-top: 5px;
        }

        /* INNHOLDS-SEKSJONER */
        .content-wrapper {
            max-width: 1100px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 60px;
            margin-bottom: 100px;
            text-align: left;
        }

        .info-row.reverse {
            flex-direction: row-reverse;
        }

        .image-box {
            flex: 1;
        }

        .image-box img {
            width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(212, 175, 55, 0.3);
            display: block;
        }

        .text-box {
            flex: 1;
        }

        .text-box h2 {
            color: var(--gold);
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-top: 0
