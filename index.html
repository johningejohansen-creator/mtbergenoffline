<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Nedtelling</title>

<style>

body{
margin:0;
height:100vh;
background:#020204;
color:#d4af37;
font-family:Arial, Helvetica, sans-serif;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
}

/* STJERNEBAKGRUNN */

.stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
overflow:hidden;
}

.star-layer{
position:absolute;
width:100%;
height:100%;
}

.star{
position:absolute;
background:white;
border-radius:50%;
animation:twinkle 3s infinite alternate;
}

.small{width:1px;height:1px;}
.medium{width:2px;height:2px;}
.large{width:3px;height:3px;}

@keyframes twinkle{
from{opacity:0.2;}
to{opacity:1;}
}

/* PARALLAX BEVEGELSE */

.layer1{animation:moveStars 200s linear infinite;}
.layer2{animation:moveStars 120s linear infinite;}
.layer3{animation:moveStars 70s linear infinite;}

@keyframes moveStars{
from{transform:translateY(0);}
to{transform:translateY(-2000px);}
}

/* STJERNESKUDD */

.shooting-star{
position:absolute;
width:2px;
height:80px;
background:linear-gradient(-45deg,white,rgba(255,255,255,0));
transform:rotate(45deg);
opacity:0;
animation:shoot 2s linear;
}

@keyframes shoot{

0%{
transform:translate(0,0) rotate(45deg);
opacity:1;
}

100%{
transform:translate(-600px,600px) rotate(45deg);
opacity:0;
}

}

/* CONTAINER */

.container{
display:flex;
flex-direction:column;
align-items:center;
}

h1{
font-size:3em;
margin-bottom:40px;
text-shadow:0 0 12px #d4af37;
}

/* COUNTDOWN */

.countdown{
display:flex;
gap:20px;
margin-bottom:40px;
}

.time-box{
background:rgba(255,255,255,0.05);
border:1px solid rgba(212,175,55,0.4);
padding:20px;
border-radius:12px;
width:110px;
backdrop-filter:blur(4px);
}

.time{
font-size:2.2em;
color:white;
}

.label{
font-size:0.8em;
margin-top:5px;
color:#d4af37;
letter-spacing:1px;
}

img{
max-width:300px;
}

</style>
</head>

<body>

<div class="stars">
<div class="star-layer layer1" id="layer1"></div>
<div class="star-layer layer2" id="layer2"></div>
<div class="star-layer layer3" id="layer3"></div>
</div>

<div class="container">

<h1>Magisk nytt kommer:</h1>

<div class="countdown">

<div class="time-box">
<div class="time" id="days">00</div>
<div class="label">DAGER</div>
</div>

<div class="time-box">
<div class="time" id="hours">00</div>
<div class="label">TIMER</div>
</div>

<div class="time-box">
<div class="time" id="minutes">00</div>
<div class="label">MIN</div>
</div>

<div class="time-box">
<div class="time" id="seconds">00</div>
<div class="label">SEK</div>
</div>

</div>

<img src="mcn.svg">

</div>

<script>

/* NEDTELLING */

const targetDate = new Date("2026-03-11T18:30:00").getTime();

function pad(n){
return n.toString().padStart(2,'0');
}

setInterval(function(){

const now = new Date().getTime();
const distance = targetDate - now;

if(distance < 0){
document.querySelector(".countdown").innerHTML="Lansert!";
return;
}

const days = Math.floor(distance/(1000*60*60*24));
const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
const seconds = Math.floor((distance%(1000*60))/1000);

document.getElementById("days").innerHTML=pad(days);
document.getElementById("hours").innerHTML=pad(hours);
document.getElementById("minutes").innerHTML=pad(minutes);
document.getElementById("seconds").innerHTML=pad(seconds);

},1000);


/* GENERER PARALLAX STJERNER */

function createStars(layerId, count, size){

const layer=document.getElementById(layerId);

for(let i=0;i<count;i++){

let star=document.createElement("div");
star.className="star "+size;

star.style.top=Math.random()*2000+"px";
star.style.left=Math.random()*100+"%";

layer.appendChild(star);

}

}

createStars("layer1",120,"small");
createStars("layer2",80,"medium");
createStars("layer3",40,"large");


/* STJERNESKUDD */

function createShootingStar(){

let star=document.createElement("div");
star.className="shooting-star";

star.style.top=Math.random()*50+"%";
star.style.left=Math.random()*80+"%";

document.body.appendChild(star);

setTimeout(()=>{star.remove();},2000);

}

setInterval(createShootingStar,4000);

</script>

</body>
</html>
