    <title>Magiske Timer 2026 | Bergen</title>

    <style>
        :root {
            --gold: #d4af37;
            --dark: #0f172a;
            --light: #f8fafc;
            --border: rgba(212, 175, 55, 0.3);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--dark);
            color: var(--light);
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        /* HEADER / HERO */
        header {
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)),

            background-position: center;
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 4px solid var(--gold);
        }

        h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 8vw, 5rem); margin: 0; color: var(--gold); }
        .sub-text { font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; opacity: 0.9; }

        /* NEDTELLING */
        #countdown-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 20px;
            border: 2px solid var(--gold);
            backdrop-filter: blur(10px);
            margin: 30px 0;
            max-width: 500px;
        }

        .timer { display: flex; gap: 20px; justify-content: center; }
        .time-box { display: flex; flex-direction: column; }
        .time-box span:first-child { font-size: 2.5rem; font-weight: 700; font-family: 'Playfair Display', serif; line-height: 1; }
        .time-box span:last-child { font-size: 0.7rem; text-transform: uppercase; color: var(--gold); }

        /* CONTENT LAYOUT */
        .content-wrapper { max-width: 1100px; margin: 0 auto; padding: 60px 20px; }

        .info-row { display: flex; align-items: center; gap: 60px; margin-bottom: 80px; }
        .info-row.reverse { flex-direction: row-reverse; }
        .image-box { flex: 1; }
        .image-box img { width: 100%; border-radius: 15px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .text-box { flex: 1; }
        .text-box h2 { color: var(--gold); font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-top: 0; }

        /* GALLERI GRID */
        .image-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 40px 0 100px 0; }
        .grid-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; border: 1px solid var(--border); transition: 0.3s; }
        .grid-item img:hover { transform: scale(1.03); border-color: var(--gold); }

        /* PROGRAM MODUL */
        .program-section { margin-top: 40px; }
        .program-day { margin-bottom: 60px; }
        .program-day h3 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 2.2rem; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 25px; }
