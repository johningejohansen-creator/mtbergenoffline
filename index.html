<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nedtelling</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #bb86fc;
        }

        #timer {
            font-size: 3.5rem;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
        }

        .label {
            font-size: 1rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Nyheter kommer:</h1>
        <div id="timer">Laster...</div>
    </div>

    <script>
        // Sett datoen vi teller ned til
        const countDownDate = new Date("March 11, 2026 12:00:00").getTime();

        // Oppdater nedtellingen hvert sekund
        const x = setInterval(function() {

            // Finn nåværende tid
            const now = new Date().getTime();

            // Finn avstanden mellom nå og datoen
            const distance = countDownDate - now;

            // Beregning av tid for dager, timer, minutter og sekunder
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Vis resultatet i elementet med id="timer"
            document.getElementById("timer").innerHTML = days + "d " + hours + "t "
            + minutes + "m " + seconds + "s ";

            // Hvis nedtellingen er over
            if (distance < 0) {
                clearInterval(x);
                document.getElementById("timer").innerHTML = "NYHETENE ER HER!";
            }
        }, 1000);
    </script>

</body>
</html>
