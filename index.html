<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Nedtelling</title>
<script>
  // Oslo-tid (CET). Etter dette sendes du til indexbak.html
  const launchTime = new Date("2026-03-05T17:46:00+01:00").getTime();
  if (Date.now() >= launchTime) window.location.replace("./indexbak.html");
</script>


<style>
body {
    margin: 0;
    background-color: #0b0b0b;
    color: #d4af37;
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

h1 {
    font-size: 3em;
    margin-bottom: 30px;
}

#countdown {
    font-size: 2.5em;
    margin-bottom: 40px;
    color: white;
}

img {
    max-width: 300px;
    height: auto;
}
</style>

</head>
<body>

<h1>Magisk nytt kommer:</h1>

<div id="countdown"></div>

<img src="mcn.svg" alt="Magisk nytt">

<script>

const targetDate = new Date("Feb 11, 2026 18:30:00").getTime();

const timer = setInterval(function() {

    const now = new Date().getTime();
    const distance = targetDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
        days + "d " + hours + "t " + minutes + "m " + seconds + "s ";

    if (distance < 0) {
        clearInterval(timer);
        document.getElementById("countdown").innerHTML = "Det er her!";
    }

}, 1000);

</script>

</body>
</html>
